name: Suggest post tags

on:
  pull_request:
    paths:
      - 'src/content/posts/**/*.md'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  suggest:
    name: Suggest tags for changed posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect changed posts
        id: posts
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'src/content/posts/**/*.md' > changed-posts.txt
          else
            find src/content/posts -name '*.md' > changed-posts.txt
          fi

          if [ ! -s changed-posts.txt ]; then
            echo "has_posts=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_posts=true" >> "$GITHUB_OUTPUT"
            cat changed-posts.txt
          fi

      - name: Generate tag suggestions
        if: steps.posts.outputs.has_posts == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # LLM mode is opt-in to avoid leaking unpublished post content by default.
          # Add the `llm-tag-suggest` label to a PR to enable it.
          USE_LLM_TAGS: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'llm-tag-suggest') }}
        run: |
          node --import tsx scripts/suggest-tags.ts $(cat changed-posts.txt) > tag-suggestions.md
          cat tag-suggestions.md

      - name: Comment tag suggestions on PR
        if: github.event_name == 'pull_request' && steps.posts.outputs.has_posts == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file tag-suggestions.md
