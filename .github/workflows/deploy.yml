name: Deploy to GitHub Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Re-check the dependency/security posture daily against newly published advisories.
    - cron: '17 4 * * *'

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  security_review:
    name: Security review
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check npm advisories
        run: npm audit --audit-level=moderate

      - name: Verify npm registry signatures
        run: npm audit signatures

      - name: Install WebP hygiene tools
        run: sudo apt-get update && sudo apt-get install -y webp

      - name: Enforce normalized public assets
        run: |
          npm run optimize-images
          git diff --exit-code -- public/assets .image-optimization-cache.json

      - name: Semgrep static security review
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install semgrep==1.136.0
          semgrep scan --config p/security-audit --config p/secrets --error

      - name: Repository hygiene review
        run: |
          forbidden_paths='(^|/)(\.agents/|\.opencode/|\.vscode/|\.husky/|tests/|dist/|\.astro/|node_modules/|playwright\.config\.ts|skills-lock\.json|DESIGN\.md|\.env(\.|$)|\.DS_Store$|.*\.pem$|.*\.p12$|.*\.pfx$|.*\.key$|.*id_rsa$|.*id_ed25519$)'
          if git ls-files | grep -E "$forbidden_paths"; then
            echo "Forbidden local/development files are tracked." >&2
            exit 1
          fi

          non_webp_assets="$({ find public/assets -type f ! -name '*.webp' -print || true; } | sed '/^$/d')"
          if [ -n "$non_webp_assets" ]; then
            echo "Only .webp files are allowed in public/assets." >&2
            echo "$non_webp_assets" >&2
            exit 1
          fi

          if git grep -n -I -E '([A]KIA[0-9A-Z]{16}|[A]SIA[0-9A-Z]{16}|[A]Iza[0-9A-Za-z_-]{35}|gh[pousr]_[A-Za-z0-9_]{36,}|github_pat_[A-Za-z0-9_]+|[x]ox[baprs]-[A-Za-z0-9-]+|[s]k-[A-Za-z0-9]{20,}|BEGIN (RSA|DSA|EC|OPENSSH|PRIVATE) KEY|[P]RIVATE KEY|[p]assword[[:space:]]*=|[p]asswd[[:space:]]*=|[s]ecret[[:space:]]*=|[a]pi[_-]?key[[:space:]]*=|[t]oken[[:space:]]*=|[a]ccess[_-]?token[[:space:]]*=|[c]lient[_-]?secret)' -- . ':(exclude)package-lock.json' ':(exclude)public/keys/publickey.naees.asc'; then
            echo "Potential secret material found in tracked files." >&2
            exit 1
          fi

          echo "Reviewed commit range:"
          git log --oneline -2
          echo "Changed files:"
          git diff --name-status HEAD~1..HEAD || true

  osv_scan:
    name: OSV vulnerability scan
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --lockfile=package-lock.json
    permissions:
      actions: read
      security-events: write
      contents: read

  build:
    needs: [security_review, osv_scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    # PR and scheduled runs audit/build only; deploy only after merge/push or manual dispatch.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        continue-on-error: true

      - name: Wait before retrying Pages deploy
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Retry deploy to GitHub Pages
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

      - name: Fail if Pages deploy did not complete
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome != 'success'
        run: exit 1
