name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Re-check the dependency/security posture daily against newly published advisories.
    - cron: '17 4 * * *'

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read
  security-events: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  security_review:
    name: Security review
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check npm advisories
        run: npm audit --audit-level=moderate

      - name: Semgrep static security review
        run: |
          python3 -m pip install --upgrade pip semgrep
          semgrep scan --config p/security-audit --config p/secrets --error

      - name: Repository hygiene review
        run: |
          forbidden_paths='^(\.agents/|\.opencode/|\.vscode/|\.husky/|tests/|playwright\.config\.ts|skills-lock\.json)'
          if git ls-files | grep -E "$forbidden_paths"; then
            echo "Forbidden local/development files are tracked." >&2
            exit 1
          fi

          non_webp_assets="$({ find public/assets -type f ! -name '*.webp' -print || true; } | sed '/^$/d')"
          if [ -n "$non_webp_assets" ]; then
            echo "Only .webp files are allowed in public/assets." >&2
            echo "$non_webp_assets" >&2
            exit 1
          fi

          echo "Reviewed commit range:"
          git log --oneline -2
          echo "Changed files:"
          git diff --name-status HEAD~1..HEAD || true

  osv_scan:
    name: OSV vulnerability scan
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |-
        --lockfile=package-lock.json
    permissions:
      actions: read
      security-events: write
      contents: read

  build:
    needs: [security_review, osv_scan]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Scheduled runs audit the current site/dependencies but do not redeploy unchanged output.
    if: github.event_name != 'schedule'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retrying Pages deploy
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Retry deploy to GitHub Pages
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v5

      - name: Fail if Pages deploy did not complete
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome != 'success'
        run: exit 1
